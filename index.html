<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchFinder — Minimal Match Search</title>
    <meta name="description" content="Explore and search historical football matches, lineups, and goal timelines in a clean, minimal interface.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar or Header depending on viewport -->
        <header class="app-header">
            <div class="brand">
                <span class="logo-dot"></span>
                <h1>PitchFinder.</h1>
            </div>
            <p class="subtitle">Minimalist Football Match Explorer</p>
        </header>

        <main class="main-content">
            <!-- Search Control Dashboard -->
            <section class="search-section">
                <form id="search-form" class="search-card" autocomplete="off" onsubmit="event.preventDefault();">
                    <div class="form-grid">
                        <!-- Club Search Field with Custom Autocomplete -->
                        <div class="form-group" id="club-group">
                            <label for="club-input">Club Name</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                <input type="text" id="club-input" placeholder="e.g. Real Madrid, Arsenal..." class="form-control">
                                <button type="button" id="clear-club" class="clear-btn" aria-label="Clear club search">&times;</button>
                            </div>
                            <div id="club-suggestions" class="suggestions-dropdown hidden"></div>
                        </div>

                        <!-- Date Field -->
                        <div class="form-group">
                            <label for="date-input">Match Date</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <input type="date" id="date-input" class="form-control">
                            </div>
                        </div>

                        <!-- Competition Field with Custom Autocomplete -->
                        <div class="form-group" id="comp-group">
                            <label for="comp-input">Competition</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                                <input type="text" id="comp-input" placeholder="e.g. Premier League, La Liga..." class="form-control">
                                <button type="button" id="clear-comp" class="clear-btn" aria-label="Clear competition search">&times;</button>
                            </div>
                            <div id="comp-suggestions" class="suggestions-dropdown hidden"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="reset-filters" class="btn btn-secondary">
                            Reset Filters
                        </button>
                        <button type="submit" id="search-submit" class="btn btn-primary">
                            <span>Search Matches</span>
                        </button>
                    </div>
                </form>
            </section>

            <!-- Results Section -->
            <section class="results-section">
                <div class="results-meta">
                    <span id="results-count">Loading dataset...</span>
                    <div id="active-filters-tags" class="filter-tags"></div>
                </div>

                <!-- Matches List Container -->
                <div id="matches-list" class="matches-list">
                    <!-- Skeleton loaders will be dynamically placed here during loading -->
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="pagination-container hidden">
                    <button id="prev-page" class="btn btn-nav" disabled>&larr; Previous</button>
                    <span id="page-indicator">Page 1 of 1</span>
                    <button id="next-page" class="btn btn-nav">Next &rarr;</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Slide-out Match Details Panel (Drawer Mode) -->
    <div id="detail-overlay" class="detail-overlay hidden"></div>
    <aside id="detail-drawer" class="detail-drawer hidden">
        <button id="close-drawer" class="close-drawer-btn" aria-label="Close details">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        
        <div class="drawer-content" id="drawer-content">
            <!-- Details will be dynamically injected here -->
        </div>
    </aside>

    <!-- Application Logic Script -->
    <script src="app.js"></script>
</body>
</html>
